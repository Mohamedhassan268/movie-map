<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>Movie Map (test)</title>
<script src="./vendor/d3.v7.min.js"></script>
<style>
  html, body { margin: 0; height: 100%; background: #111; color: #eee; font-family: system-ui, sans-serif; overflow: hidden; }
  #toolbar { position: absolute; top: 10px; left: 10px; z-index: 10; display: flex; gap: 8px; align-items: center; }
  #toolbar button { background: #222; color: #eee; border: 1px solid #444; padding: 6px 12px; border-radius: 6px; cursor: pointer; }
  #toolbar button:hover { background: #333; }
  #info { position: absolute; bottom: 10px; left: 10px; z-index: 10; max-width: 320px; background: #1c1c1c; border: 1px solid #333; border-radius: 8px; padding: 10px 14px; font-size: 14px; }
  #info h2 { margin: 0 0 4px; font-size: 16px; }
  #info .meta { color: #999; font-size: 12px; margin-bottom: 6px; }
  #info .tags span { display: inline-block; background: #2a2a2a; border-radius: 10px; padding: 2px 8px; margin: 2px; font-size: 11px; }
  svg { width: 100vw; height: 100vh; display: block; }
  text.label { fill: #ddd; font-size: 11px; pointer-events: none; }
  circle.node { stroke: #000; stroke-width: 1px; cursor: pointer; }
  circle.node.center { stroke: #fff; stroke-width: 2px; }
  line.link { stroke: #555; stroke-opacity: 0.6; }

  #landing { position: fixed; inset: 0; z-index: 20; background: #111; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 18px; }
  #landing h1 { margin: 0; font-size: 22px; }
  #landing p.sub { margin: 0; color: #999; font-size: 13px; }
  #origin-filter { display: flex; gap: 8px; }
  #origin-filter button { background: #222; color: #999; border: 1px solid #444; padding: 8px 16px; border-radius: 20px; cursor: pointer; font-size: 13px; }
  #origin-filter button.active { background: #3a5a8a; color: #fff; border-color: #4a7ac0; }
  #search-box { width: 340px; padding: 10px 14px; border-radius: 8px; border: 1px solid #444; background: #1c1c1c; color: #eee; font-size: 14px; }
  #search-results { width: 340px; max-height: 320px; overflow-y: auto; border: 1px solid #333; border-radius: 8px; background: #1a1a1a; }
  #search-results .item { padding: 10px 14px; cursor: pointer; border-bottom: 1px solid #262626; display: flex; justify-content: space-between; }
  #search-results .item:last-child { border-bottom: none; }
  #search-results .item:hover { background: #262626; }
  #search-results .item .year { color: #777; font-size: 12px; }
  #search-results .empty { padding: 14px; color: #777; font-size: 13px; text-align: center; }
</style>
</head>
<body>
<div id="landing">
  <h1>Movie &amp; Show Map</h1>
  <p class="sub">Pick a title to start exploring similar movies and shows.</p>
  <div id="origin-filter">
    <button data-origin="ar" class="active">Arabic movies</button>
    <button data-origin="en">English movies</button>
  </div>
  <input id="search-box" type="text" placeholder="Search titles..." autocomplete="off" />
  <div id="search-results"></div>
</div>

<div id="toolbar" style="display:none;">
  <button id="reset">Overview</button>
  <button id="new-search">New search</button>
</div>
<div id="info"></div>
<svg></svg>
<script>
const GENRE_COLORS = {
  comedy: "#e0b354", drama: "#5b8fd6", crime: "#c05a5a", action: "#d67b3a",
  history: "#8b6bb0", war: "#6b6b6b", romance: "#d16a9a", family: "#6bb08a",
  fantasy: "#7a6bd6", horror: "#8a2b2b", mystery: "#4a6a8a", thriller: "#4a4a8a",
  biography: "#a08a5a", musical: "#c98ac9", documentary: "#6a8a6a",
};

let allData = [];
let byId = {};
let svg, simulation;
let originFilter = "ar";

// A title's own origin decides its display language: non-Arabic TMDB
// original_language (foreign films screened in Egypt) -> English name;
// Arabic-origin or no TMDB match (most of the catalog) -> Arabic name.
function isForeignOrigin(d) {
  return !!(d.tmdb_original_language && d.tmdb_original_language !== "ar");
}

function nativeTitle(d) {
  if (isForeignOrigin(d)) return d.title_en || d.title_ar || d.id;
  return d.title_ar || d.title_en || d.id;
}

function colorOf(d) {
  const g = (d.genres && d.genres[0]) || "";
  return GENRE_COLORS[g.toLowerCase()] || "#888";
}

function renderInfo(d) {
  const tags = (d.mood_tags && d.mood_tags.ai_suggested) || [];
  document.getElementById("info").innerHTML = `
    <h2>${nativeTitle(d)}</h2>
    <div class="meta">${d.year || "?"} &middot; ${(d.genres || []).join(", ") || "no genre data"}</div>
    <div class="tags">${tags.map(t => `<span>${t}</span>`).join("") || "<span>no mood tags</span>"}</div>
  `;
}

function buildGraph(centerId) {
  const center = byId[centerId];
  const neighborIds = (center.neighbors || []).map(n => n.id);
  const nodeIds = new Set([centerId, ...neighborIds]);
  const nodes = [...nodeIds].map(id => ({ ...byId[id] }));
  const links = neighborIds.map(id => ({ source: centerId, target: id }));
  return { nodes, links };
}

// Overview of the current origin's catalog, capped so we don't try to
// force-layout thousands of nodes at once — the full catalog is ~4.5k titles,
// and rendering them all would freeze the browser. Shows up to OVERVIEW_MAX
// titles and only the links among them.
const OVERVIEW_MAX = 250;
function buildFullGraph() {
  const pool = filteredByOrigin().slice(0, OVERVIEW_MAX);
  const poolIds = new Set(pool.map(d => d.id));
  const nodes = pool.map(d => ({ ...d }));
  const links = [];
  const seen = new Set();
  pool.forEach(d => {
    (d.neighbors || []).forEach(n => {
      if (!poolIds.has(n.id)) return;
      const key = [d.id, n.id].sort().join("|");
      if (!seen.has(key)) {
        seen.add(key);
        links.push({ source: d.id, target: n.id });
      }
    });
  });
  return { nodes, links };
}

function draw({ nodes, links }, centerId) {
  svg.selectAll("*").remove();
  const width = window.innerWidth, height = window.innerHeight;

  simulation = d3.forceSimulation(nodes)
    .force("link", d3.forceLink(links).id(d => d.id).distance(centerId ? 130 : 90).strength(0.5))
    .force("charge", d3.forceManyBody().strength(centerId ? -400 : -120))
    .force("center", d3.forceCenter(width / 2, height / 2))
    .force("collide", d3.forceCollide(28));

  const link = svg.append("g").selectAll("line")
    .data(links).join("line").attr("class", "link");

  const node = svg.append("g").selectAll("circle")
    .data(nodes).join("circle")
    .attr("class", d => "node" + (d.id === centerId ? " center" : ""))
    .attr("r", d => d.id === centerId ? 20 : 12)
    .attr("fill", colorOf)
    .on("click", (event, d) => {
      renderInfo(d);
      draw(buildGraph(d.id), d.id);
    })
    .on("mouseover", (event, d) => renderInfo(d))
    .call(drag(simulation));

  const label = svg.append("g").selectAll("text")
    .data(nodes).join("text")
    .attr("class", "label")
    .attr("dy", d => (d.id === centerId ? 32 : 22))
    .attr("text-anchor", "middle")
    .text(nativeTitle);

  simulation.on("tick", () => {
    link
      .attr("x1", d => d.source.x).attr("y1", d => d.source.y)
      .attr("x2", d => d.target.x).attr("y2", d => d.target.y);
    node.attr("cx", d => d.x).attr("cy", d => d.y);
    label.attr("x", d => d.x).attr("y", d => d.y);
  });

  if (centerId) renderInfo(byId[centerId]);
}

function drag(sim) {
  function started(event, d) {
    if (!event.active) sim.alphaTarget(0.3).restart();
    d.fx = d.x; d.fy = d.y;
  }
  function dragged(event, d) { d.fx = event.x; d.fy = event.y; }
  function ended(event, d) {
    if (!event.active) sim.alphaTarget(0);
    d.fx = null; d.fy = null;
  }
  return d3.drag().on("start", started).on("drag", dragged).on("end", ended);
}

function filteredByOrigin() {
  return allData.filter(d => originFilter === "en" ? isForeignOrigin(d) : !isForeignOrigin(d));
}

function renderSearchResults(query) {
  const pool = filteredByOrigin();
  const q = query.trim().toLowerCase();
  const matches = q
    ? pool.filter(d => nativeTitle(d).toLowerCase().includes(q) ||
                        (d.title_en || "").toLowerCase().includes(q) ||
                        (d.title_ar || "").includes(query.trim()))
    : pool;

  const container = document.getElementById("search-results");
  if (matches.length === 0) {
    container.innerHTML = `<div class="empty">No titles found.</div>`;
    return;
  }
  container.innerHTML = matches
    .slice(0, 30)
    .map(d => `<div class="item" data-id="${d.id}"><span>${nativeTitle(d)}</span><span class="year">${d.year || ""}</span></div>`)
    .join("");
  container.querySelectorAll(".item").forEach(el => {
    el.addEventListener("click", () => selectTitle(el.dataset.id));
  });
}

function selectTitle(id) {
  document.getElementById("landing").style.display = "none";
  document.getElementById("toolbar").style.display = "flex";
  draw(buildGraph(id), id);
}

document.getElementById("reset").addEventListener("click", () => draw(buildFullGraph(), null));
document.getElementById("new-search").addEventListener("click", () => {
  document.getElementById("toolbar").style.display = "none";
  document.getElementById("landing").style.display = "flex";
  document.getElementById("search-box").value = "";
  renderSearchResults("");
});

document.querySelectorAll("#origin-filter button").forEach(btn => {
  btn.addEventListener("click", () => {
    document.querySelectorAll("#origin-filter button").forEach(b => b.classList.remove("active"));
    btn.classList.add("active");
    originFilter = btn.dataset.origin;
    renderSearchResults(document.getElementById("search-box").value);
  });
});

document.getElementById("search-box").addEventListener("input", (e) => renderSearchResults(e.target.value));

svg = d3.select("svg");
fetch("./data.json")
  .then(r => r.json())
  .then(data => {
    allData = data;
    byId = Object.fromEntries(data.map(d => [d.id, d]));
    renderSearchResults("");
  });
</script>
</body>
</html>
