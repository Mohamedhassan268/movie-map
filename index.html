<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Movie &amp; Show Map</title>
<script src="./vendor/d3.v7.min.js"></script>
<style>
  :root { --bg: #0d0f14; --panel: #171a22; --border: #2a2f3a; --text: #e8e8ea; --muted: #8b909c; --accent: #3a5a8a; }
  html, body { margin: 0; min-height: 100%; background: var(--bg); color: var(--text); font-family: system-ui, sans-serif; }
  /* The landing/search page scrolls normally (mobile-friendly); the map view
     locks scroll to its own full-viewport SVG once a title is centered. */
  body.map-open { overflow: hidden; height: 100%; }

  /* Subtle, non-flashy cinematic wallpaper: deep gradient + faint film-strip motif. */
  #wallpaper {
    position: fixed; inset: 0; z-index: 0; pointer-events: none;
    background:
      radial-gradient(1200px 600px at 50% -10%, #1a2030 0%, transparent 60%),
      linear-gradient(160deg, #0d0f14 0%, #10131a 55%, #0b0d12 100%);
  }
  #wallpaper::after {
    content: ""; position: absolute; inset: 0; opacity: 0.05;
    background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='60' height='40'><rect width='60' height='40' fill='none'/><rect x='4' y='6' width='8' height='6' rx='1' fill='%23ffffff'/><rect x='4' y='28' width='8' height='6' rx='1' fill='%23ffffff'/><rect x='48' y='6' width='8' height='6' rx='1' fill='%23ffffff'/><rect x='48' y='28' width='8' height='6' rx='1' fill='%23ffffff'/></svg>");
    background-size: 60px 40px;
  }

  /* Per-movie backdrop: sits above #wallpaper, below the graph. Cross-fades
     in via opacity when a centered title has a TMDB backdrop image. */
  #backdrop {
    position: fixed; inset: 0; z-index: 0; pointer-events: none;
    background-size: cover; background-position: center;
    opacity: 0; transition: opacity 0.6s ease, background-image 0.6s ease;
    filter: blur(2px) brightness(0.6);
  }
  #backdrop.show { opacity: 1; }
  #backdrop::after {
    content: ""; position: absolute; inset: 0;
    background: linear-gradient(160deg, rgba(13,15,20,0.25) 0%, rgba(13,15,20,0.45) 100%);
  }

  /* Landing */
  #landing { position: relative; z-index: 20; box-sizing: border-box; min-height: 100dvh; display: flex; flex-direction: column; align-items: center; justify-content: flex-start; gap: 16px; padding: 10vh 20px 40px; }
  #landing h1 { margin: 0; font-size: 30px; letter-spacing: 0.3px; text-align: center; }
  #landing p.sub { margin: 0; color: var(--muted); font-size: 14px; text-align: center; }
  #origin-filter { display: flex; gap: 8px; margin-top: 4px; }
  #origin-filter button { background: rgba(255,255,255,0.04); color: var(--muted); border: 1px solid var(--border); padding: 8px 18px; border-radius: 22px; cursor: pointer; font-size: 13px; }
  #origin-filter button.active { background: var(--accent); color: #fff; border-color: #4a7ac0; }
  #search-wrap { width: min(420px, 90vw); }
  #search-box { width: 100%; box-sizing: border-box; padding: 12px 16px; border-radius: 10px; border: 1px solid var(--border); background: rgba(20,22,30,0.9); color: var(--text); font-size: 15px; }
  #search-box:focus { outline: none; border-color: var(--accent); }
  /* In-flow (not an absolutely-positioned dropdown) so results push the page
     taller and the whole page scrolls to reach them — no results were being
     trapped inside a fixed-height, separately-scrolling box. */
  #search-results { width: 100%; box-sizing: border-box; margin-top: 6px; background: var(--panel); border: 1px solid var(--border); border-radius: 10px; display: none; }
  #search-results.show { display: block; }
  #search-results .item { display: flex; gap: 10px; align-items: center; padding: 8px 12px; cursor: pointer; border-bottom: 1px solid #21252e; }
  #search-results .item:last-child { border-bottom: none; }
  #search-results .item:hover { background: #202533; }
  #search-results .item img { width: 34px; height: 51px; object-fit: cover; border-radius: 3px; background: #222; flex: none; }
  #search-results .item .t { flex: 1; min-width: 0; }
  #search-results .item .t .name { font-size: 14px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  #search-results .item .t .sub { font-size: 12px; color: var(--muted); }
  #search-results .badge { font-size: 10px; color: var(--muted); border: 1px solid var(--border); border-radius: 6px; padding: 1px 6px; flex: none; }
  #search-results .msg { padding: 14px; color: var(--muted); font-size: 13px; text-align: center; }

  /* Map */
  #toolbar { position: absolute; top: 10px; left: 10px; z-index: 10; display: none; flex-direction: column; gap: 8px; align-items: flex-start; }
  .toolbar-row { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; max-width: calc(100vw - 20px); }
  #toolbar button { background: var(--panel); color: var(--text); border: 1px solid var(--border); padding: 6px 12px; border-radius: 6px; cursor: pointer; font-size: 13px; }
  #toolbar button:hover { background: #202533; }
  #toolbar button:disabled { opacity: 0.4; cursor: default; }
  #toolbar button.active { background: var(--accent); border-color: #4a7ac0; }
  #threshold-wrap { display: flex; align-items: center; gap: 6px; background: var(--panel); border: 1px solid var(--border); border-radius: 6px; padding: 4px 12px; font-size: 12px; color: var(--muted); }
  #threshold-wrap input[type="range"] { width: 100px; }
  #filters-toggle { position: relative; }
  /* Desktop: everything lives directly in the toolbar row, so this menu
     button/container is unused. Shown only in the mobile media query below. */
  #controls-toggle { display: none; }
  #controls-menu { display: none; }
  #filters-badge { display: none; }
  #filters-badge.show { display: inline-block; background: var(--accent); color: #fff; border-radius: 8px; font-size: 10px; padding: 0 5px; margin-left: 5px; }
  #filters { display: none; flex-direction: column; gap: 6px; background: var(--panel); border: 1px solid var(--border); border-radius: 8px; padding: 8px 10px; max-width: min(420px, calc(100vw - 20px)); max-height: 240px; overflow-y: auto; }
  .filter-row { display: flex; flex-wrap: wrap; gap: 6px; align-items: center; }
  .flabel { font-size: 11px; color: var(--muted); width: 46px; flex: none; }
  .chips { display: flex; flex-wrap: wrap; gap: 6px; }
  .chip { background: rgba(255,255,255,0.04); color: var(--muted); border: 1px solid var(--border); padding: 3px 10px; border-radius: 14px; cursor: pointer; font-size: 11px; }
  .chip:hover { background: #202533; }
  .chip.active { background: var(--accent); color: #fff; border-color: #4a7ac0; }
  #surprise { background: rgba(255,255,255,0.04); color: var(--muted); border: 1px solid var(--border); padding: 10px 20px; border-radius: 22px; cursor: pointer; font-size: 13px; margin-top: 4px; }
  #surprise:hover:not(:disabled) { background: #202533; color: var(--text); }
  #surprise:disabled { opacity: 0.4; cursor: default; }
  #info { position: absolute; bottom: 10px; left: 10px; z-index: 10; width: 320px; max-width: calc(100vw - 20px); max-height: 45vh; overflow-y: auto; background: var(--panel); border: 1px solid var(--border); border-radius: 8px; padding: 10px 14px; font-size: 14px; display: none; }
  /* Drag handle for the mobile bottom-sheet layout only — desktop keeps the
     plain card (head + body both always visible), so this stays hidden. */
  #info .sheet-handle { display: none; }
  #info h2 { margin: 0 0 4px; font-size: 16px; }
  #info .meta { color: var(--muted); font-size: 12px; margin-bottom: 6px; }
  #info .rating { color: #e0b354; font-size: 12px; margin-bottom: 6px; }
  #info .summary { font-size: 12.5px; line-height: 1.5; color: #cfd3da; margin-bottom: 6px; clear: both; }
  #info .summary.muted { color: var(--muted); font-style: italic; }
  #info .poster { width: 64px; border-radius: 4px; float: right; margin-left: 10px; }
  #info .tags span { display: inline-block; background: #232733; border-radius: 10px; padding: 2px 8px; margin: 2px; font-size: 11px; }
  #tooltip { position: fixed; z-index: 30; max-width: 240px; background: rgba(23,26,34,0.97); border: 1px solid var(--border); border-radius: 8px; padding: 8px 10px; font-size: 13px; pointer-events: none; display: none; box-shadow: 0 4px 16px rgba(0,0,0,0.4); }
  #tooltip .tt-title { font-weight: 600; margin-bottom: 2px; }
  #tooltip .tt-sub { color: var(--muted); font-size: 11px; margin-bottom: 4px; }
  #tooltip .tt-sub .pct { color: #8fb4e8; font-weight: 600; }
  #tooltip .tags span { display: inline-block; background: #2a3550; border-radius: 10px; padding: 2px 8px; margin: 2px 2px 0 0; font-size: 11px; }
  #legend { position: absolute; top: 52px; right: 10px; z-index: 10; background: var(--panel); border: 1px solid var(--border); border-radius: 8px; padding: 8px 12px; font-size: 11px; color: var(--muted); display: none; }
  #legend .bar { width: 140px; height: 10px; border-radius: 5px; margin: 4px 0; }
  #legend .ends { display: flex; justify-content: space-between; }
  /* Only relevant once a title's summary is on screen, so it's hidden on the
     landing/search page and only shown in map view (body.map-open). */
  #lang-toggle { display: none; position: fixed; top: 10px; right: 10px; z-index: 25; gap: 6px; }
  body.map-open #lang-toggle { display: flex; }
  #lang-toggle button { background: rgba(255,255,255,0.04); color: var(--muted); border: 1px solid var(--border); padding: 6px 12px; border-radius: 16px; cursor: pointer; font-size: 12px; }
  #lang-toggle button.active { background: var(--accent); color: #fff; border-color: #4a7ac0; }
  #loading { position: absolute; top: 50%; left: 50%; transform: translate(-50%,-50%); z-index: 5; color: var(--muted); font-size: 14px; display: none; }
  /* Hidden until a title is centered (body.map-open) — otherwise its 100vh
     box would sit in normal document flow below the landing content and add
     a full viewport of blank scrollable space. */
  svg { display: none; position: relative; z-index: 1; width: 100vw; height: 100vh; }
  body.map-open svg { display: block; }
  text.label { fill: #ddd; font-size: 11px; pointer-events: none; text-shadow: 0 1px 3px rgba(0,0,0,0.9), 0 0 6px rgba(0,0,0,0.6); }
  circle.node { stroke: #000; stroke-width: 1px; cursor: pointer; }
  circle.node.center { stroke: #fff; stroke-width: 2px; }
  line.link { stroke: #4a4f5c; stroke-opacity: 0.6; }

  /* ============ Mobile layout ============
     Desktop (above) is untouched. Below 640px: the scattered corner-pinned
     panels (color/threshold/vibes/language/legend) collapse into a single
     "Controls" menu (reparented by JS — see applyControlsLayout), and the
     detail panel becomes a bottom sheet that peeks instead of covering the
     map. */
  @media (max-width: 640px) {
    #toolbar { left: 8px; right: 8px; top: max(10px, env(safe-area-inset-top)); }
    .toolbar-row { max-width: 100%; }
    #toolbar button { min-height: 40px; }

    #controls-toggle { display: inline-flex; align-items: center; justify-content: center; font-size: 16px; }
    #controls-menu {
      flex-direction: column; gap: 10px;
      position: fixed; top: calc(52px + env(safe-area-inset-top)); left: 8px; right: 8px; z-index: 24;
      max-height: 70vh; overflow-y: auto;
      background: var(--panel); border: 1px solid var(--border); border-radius: 10px; padding: 10px;
    }
    #controls-menu.open { display: flex; }
    /* Un-pin the reparented panels (some are position:fixed/absolute in their
       desktop rules) so they flow as normal full-width rows inside the menu.
       Their own show/hide (inline `display`, JS-driven) is left alone. */
    #controls-menu #lang-toggle,
    #controls-menu #legend,
    #controls-menu #filters-toggle,
    #controls-menu #color-toggle,
    #controls-menu #threshold-wrap,
    #controls-menu #filters {
      position: static; width: 100%; box-sizing: border-box; top: auto; left: auto; right: auto; bottom: auto;
    }
    #controls-menu #lang-toggle button { flex: 1; }
    #controls-menu #threshold-wrap input[type="range"] { flex: 1; width: auto; }
    /* color-toggle/filters-toggle were only styled via the ancestor-dependent
       "#toolbar button" selector — once reparented out of #toolbar they'd
       render as unstyled default buttons, so restyle them here by container
       instead of by original ancestry. (lang-toggle/chip buttons already
       have their own non-ancestor-dependent rules and are unaffected.) */
    #controls-menu button {
      background: var(--panel); color: var(--text); border: 1px solid var(--border);
      padding: 6px 12px; border-radius: 6px; cursor: pointer; font-size: 13px; min-height: 40px;
    }
    #controls-menu button:hover { background: #202533; }
    #controls-menu button.active { background: var(--accent); border-color: #4a7ac0; color: #fff; }
    .chip { min-height: 32px; padding: 6px 12px; }

    /* Detail panel -> bottom sheet: collapsed shows just the head (poster,
       title, meta, rating) so the map stays visible; tap to expand for the
       full summary. */
    #info {
      left: 0; right: 0; bottom: 0; top: auto; width: 100%; max-width: 100%;
      max-height: 80vh; border-radius: 16px 16px 0 0;
      padding: 8px 16px calc(10px + env(safe-area-inset-bottom));
    }
    #info .sheet-handle { display: block; width: 40px; height: 4px; background: var(--border); border-radius: 2px; margin: 0 auto 10px; cursor: pointer; }
    #info .sheet-head { cursor: pointer; }
    #info .sheet-body { display: none; }
    #info.expanded .sheet-body { display: block; }
    #info.expanded { max-height: 80vh; overflow-y: auto; }
  }

  /* Neighbour hover tooltip only makes sense with a mouse — touch has no
     hover, so it would otherwise flash open on tap-and-hold with no way to
     dismiss it cleanly. The detail sheet covers the centered title instead. */
  @media (pointer: coarse) {
    #tooltip { display: none !important; }
  }
</style>
</head>
<body>
<div id="wallpaper"></div>
<div id="backdrop"></div>

<div id="lang-toggle">
  <button data-lang="en" class="active">English</button>
  <button data-lang="ar">العربية</button>
</div>

<div id="landing">
  <h1>Movie &amp; Show Map</h1>
  <p class="sub">Start exploring similar movies and shows.</p>
  <div id="origin-filter">
    <button data-origin="ar" class="active">Arabic movies</button>
    <button data-origin="en">English movies</button>
  </div>
  <div id="search-wrap">
    <input id="search-box" type="text" placeholder="Search titles..." autocomplete="off" />
    <div id="search-results"></div>
  </div>
  <button id="surprise" disabled>&#127922; Surprise me</button>
</div>

<div id="toolbar">
  <div class="toolbar-row">
    <button id="back" disabled>&larr; Back</button>
    <button id="new-search">New search</button>
    <button id="color-toggle" class="active" title="Toggle node color between similarity and genre">Color: similarity</button>
    <div id="threshold-wrap">
      <span>Min similarity</span>
      <input id="threshold" type="range" min="0" max="100" value="0" />
      <span id="threshold-val">0%</span>
    </div>
    <button id="filters-toggle">Vibes<span id="filters-badge"></span></button>
    <button id="controls-toggle" title="More controls">&#9881;</button>
  </div>
  <div id="filters">
    <div class="filter-row"><span class="flabel" id="flabel-genre">Genre</span><div id="genre-chips" class="chips"></div></div>
    <div class="filter-row"><span class="flabel" id="flabel-mood">Mood</span><div id="mood-chips" class="chips"></div></div>
    <div class="filter-row"><span class="flabel" id="flabel-decade">Decade</span><div id="decade-chips" class="chips"></div></div>
  </div>
</div>
<!-- Mobile-only: color-toggle/threshold-wrap/filters-toggle/filters/lang-toggle/legend are
     reparented here on narrow screens (see applyControlsLayout in the script), so the top
     bar doesn't collide with itself on a phone. Restored to their original spots on desktop. -->
<div id="controls-menu"></div>
<div id="legend">
  <div>Similarity to centered title</div>
  <div class="bar" id="legend-bar"></div>
  <div class="ends"><span id="legend-min">0%</span><span id="legend-max">100%</span></div>
</div>
<div id="info"></div>
<div id="tooltip"></div>
<div id="loading">Loading...</div>
<svg></svg>

<script>
const IMG_BASE = "https://image.tmdb.org/t/p/w92";
const GENRE_COLORS = {
  comedy: "#e0b354", drama: "#5b8fd6", crime: "#c05a5a", action: "#d67b3a",
  history: "#8b6bb0", war: "#6b6b6b", romance: "#d16a9a", family: "#6bb08a",
  fantasy: "#7a6bd6", horror: "#8a2b2b", mystery: "#4a6a8a", thriller: "#4a4a8a",
  documentary: "#6a8a6a", music: "#c98ac9", animation: "#c98ac9",
  adventure: "#d67b3a", "science fiction": "#5aa0a0", "tv movie": "#6a8a6a",
  western: "#a08a5a", "action & adventure": "#d67b3a", "sci-fi & fantasy": "#7a6bd6",
  "war & politics": "#6b6b6b", kids: "#6bb08a", reality: "#8b909c", soap: "#d16a9a",
};

// Arabic display names for Vibes chips (genre/mood/era) and category labels.
// Titles are never translated — only these chip labels and the summary text
// follow the language toggle (see summaryLang / tr()).
const AR_GENRE = {
  "Action": "أكشن", "Adventure": "مغامرة", "Animation": "رسوم متحركة",
  "Comedy": "كوميديا", "Crime": "جريمة", "Documentary": "وثائقي", "Drama": "دراما",
  "Family": "عائلي", "Fantasy": "خيال", "History": "تاريخي", "Horror": "رعب",
  "Music": "موسيقى", "Mystery": "غموض", "Romance": "رومانسي",
  "Science Fiction": "خيال علمي", "TV Movie": "فيلم تلفزيوني", "Thriller": "إثارة",
  "War": "حرب", "Western": "وسترن", "Action & Adventure": "أكشن ومغامرة",
  "Kids": "أطفال", "News": "أخبار", "Reality": "واقع",
  "Sci-Fi & Fantasy": "خيال علمي وفانتازيا", "Soap": "مسلسل درامي", "Talk": "حواري",
  "War & Politics": "حرب وسياسة",
};
const AR_MOOD = {
  "family drama": "دراما عائلية", "family saga": "ملحمة عائلية",
  "coming-of-age": "سن النضوج", "forbidden love": "حب ممنوع",
  "marriage & betrayal": "زواج وخيانة", "friendship & loyalty": "صداقة ووفاء",
  "generational conflict": "صراع الأجيال", "social commentary": "نقد اجتماعي",
  "class conflict": "صراع طبقي", "poverty & survival": "فقر وبقاء",
  "corruption": "فساد", "political intrigue": "دسائس سياسية",
  "immigration & displacement": "هجرة ونزوح", "women's struggle": "كفاح المرأة",
  "crime & heist": "جريمة وسرقة", "revenge": "انتقام",
  "moral dilemma": "معضلة أخلاقية", "prison & captivity": "سجن وأسر",
  "war & conflict": "حرب وصراع", "underdog": "الضعيف المنتصر",
  "redemption": "خلاص", "tragedy": "مأساة", "nostalgia": "حنين",
  "hope & resilience": "أمل وصمود", "despair & loss": "يأس وفقدان",
  "triumph over adversity": "انتصار على الشدائد", "slapstick comedy": "كوميديا هزلية",
  "satire": "سخرية", "feel-good": "مفرح", "comedy of errors": "كوميديا المفارقات",
  "musical & celebration": "موسيقي واحتفالي", "mystery & suspense": "غموض وتشويق",
  "supernatural & horror": "خارق للطبيعة ورعب", "psychological thriller": "إثارة نفسية",
  "historical epic": "ملحمة تاريخية", "religious & spiritual": "ديني وروحاني",
  "folklore & legend": "فلكلور وأسطورة",
};
const AR_MISC = { "same era": "نفس الحقبة", "nearby era": "حقبة قريبة", "similar plot": "حبكة مشابهة" };
const AR_CATEGORY = { "Genre": "النوع", "Mood": "المزاج", "Decade": "العقد" };

// summaryLang drives ONLY the summary text and Vibes chip/tooltip labels —
// movie titles always stay in their original language (nativeTitle) and the
// separate Arabic/English origin filter is unaffected.
let summaryLang = localStorage.getItem("summaryLang") === "ar" ? "ar" : "en";
function tr(name) {
  if (summaryLang !== "ar") return name;
  return AR_GENRE[name] || AR_MOOD[name] || AR_MISC[name] || name;
}
function catLabel(en) {
  return summaryLang === "ar" ? (AR_CATEGORY[en] || en) : en;
}

let originFilter = "ar";
let genreMap = {};          // id -> name, populated from TMDB genre lists
let neighborCache = {};     // "type:id" -> neighbor nodes (avoid refetch on recenter)
let detailsCache = {};      // "type:id" -> { backdrop_path, vote_average, keywords }
let history = [];           // stack of centered items for the Back button
let svg, simulation;

// Curated catalog (docs/data.json): our ~4.5k Egyptian titles, searched first.
let catalog = [];           // adapted TMDB-shaped items
let catalogById = {};       // string tmdb_id -> raw catalog record (for neighbors)
let catalogReady = false;

// Similarity map state
let colorMode = "sim";      // "sim" | "genre"
let simThreshold = 0;       // 0-100, hides neighbours below this %
let simColor = () => "#888";
let currentCenter = null;
let currentNeighbors = [];  // full neighbour list (with _sim/_why), before threshold filtering
let currentKeywords = [];   // the centered title's keywords/mood tags, so the language
                             // toggle can re-render the detail panel without a refetch

// Filter-chip state — reset whenever a new title is centered (see centerOn)
let selectedGenres = new Set();
let selectedMoods = new Set();
let selectedDecades = new Set();
let filtersOpen = false;   // the chip panel stays collapsed until toggled open

function api(endpoint, params = {}) {
  const qs = new URLSearchParams({ endpoint, ...params });
  return fetch(`/api/tmdb?${qs}`).then(r => r.json());
}

// Escape untrusted text before it goes into innerHTML. Movie titles, keywords
// and overviews come from TMDB (community-editable) or our scraped data, so
// they must never be treated as markup.
function esc(s) {
  return String(s == null ? "" : s).replace(/[&<>"']/g, c =>
    ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;" }[c]));
}

// --- item helpers (an "item" is a raw TMDB movie/tv object) ---
function itemType(x) { return x.media_type || (x.title != null ? "movie" : "tv"); }
function itemId(x) { return `${itemType(x)}:${x.id}`; }
function itemYear(x) { return (x.release_date || x.first_air_date || "").slice(0, 4); }
function itemTitleEn(x) { return x.title || x.name || ""; }
function itemTitleNative(x) { return x.original_title || x.original_name || itemTitleEn(x); }
function isForeign(x) { return x.original_language && x.original_language !== "ar"; }

// Display language follows the title's own origin: foreign -> English name,
// Arabic-origin -> its Arabic (original) name.
function nativeTitle(x) {
  if (isForeign(x)) return itemTitleEn(x) || itemTitleNative(x) || String(x.id);
  return itemTitleNative(x) || itemTitleEn(x) || String(x.id);
}

function genreNames(x) {
  if (x._genres) return x._genres;   // catalog items carry genre names directly
  const ids = x.genre_ids || (x.genres ? x.genres.map(g => g.id) : []);
  return ids.map(id => genreMap[id]).filter(Boolean);
}

function colorOf(x) {
  if (colorMode === "sim" && x._sim != null) return simColor(x._sim);
  const g = (genreNames(x)[0] || "").toLowerCase();
  return GENRE_COLORS[g] || "#888";
}

function posterUrl(x, size) { return x.poster_path ? (size ? `https://image.tmdb.org/t/p/${size}` : IMG_BASE) + x.poster_path : ""; }

// --- similarity model ---
// Catalog neighbours carry a real precomputed score (similarity/compute_similarity.py);
// everything else (a live-TMDB neighbour) gets a lighter client-side estimate so the
// color/tooltip work everywhere.
function genreJaccard(a, b) {
  const ga = new Set(genreNames(a).map(g => g.toLowerCase()));
  const gb = new Set(genreNames(b).map(g => g.toLowerCase()));
  if (ga.size === 0 || gb.size === 0) return 0;
  const shared = [...ga].filter(g => gb.has(g));
  const union = new Set([...ga, ...gb]);
  return shared.length / union.size;
}
function moodTagsOf(x) {
  return (x._catalog && x._catalog.mood_tags && x._catalog.mood_tags.ai_suggested) || [];
}
function sharedMoodTags(a, b) {
  const ta = moodTagsOf(a), tb = moodTagsOf(b);
  if (!ta.length || !tb.length) return [];
  const setB = new Set(tb);
  return ta.filter(t => setB.has(t));
}
function moodJaccard(a, b) {
  const ma = new Set(moodTagsOf(a)), mb = new Set(moodTagsOf(b));
  if (ma.size === 0 || mb.size === 0) return 0;
  const shared = [...ma].filter(m => mb.has(m));
  const union = new Set([...ma, ...mb]);
  return shared.length / union.size;
}
function eraProximity(a, b) {
  const ya = +itemYear(a), yb = +itemYear(b);
  if (!ya || !yb) return 0;
  const diff = Math.abs(Math.floor(ya / 10) - Math.floor(yb / 10));
  if (diff === 0) return 1;
  if (diff === 1) return 0.5;
  return 0;
}
// Full weighted score (mirrors similarity/compute_similarity.py's genre 35% /
// mood 45% / era 20%) for two catalog items that AREN'T each other's
// precomputed neighbour. Used only to extend same-origin-language candidates
// in catalogNeighbors() below — the plain client-side estimate in simBetween
// (used for live-TMDB neighbours) omits mood entirely since TMDB items have
// no mood tags, but both sides here are catalog items that do.
function catalogFullScore(a, b) {
  return 0.35 * genreJaccard(a, b) + 0.45 * moodJaccard(a, b) + 0.20 * eraProximity(a, b);
}
// Attach `_sim` (0-1) and `_why` (breakdown) to a neighbour relative to center.
// `neighbor._semScore` (plot/theme cosine similarity, 0-1) is set beforehand
// by attachSemanticScores() for live-TMDB neighbours that have no precomputed
// catalog score - see below.
function simBetween(center, neighbor) {
  const sharedGenres = genreNames(center).filter(g =>
    genreNames(neighbor).map(x => x.toLowerCase()).includes(g.toLowerCase()));
  const mood = sharedMoodTags(center, neighbor);
  const era = eraProximity(center, neighbor);
  const precomputed = neighbor._score;
  const semantic = neighbor._semScore;
  let score;
  if (precomputed != null) {
    score = precomputed;
  } else if (semantic != null) {
    score = 0.5 * semantic + 0.3 * genreJaccard(center, neighbor) + 0.2 * era;
  } else {
    score = 0.7 * genreJaccard(center, neighbor) + 0.3 * era;
  }
  return {
    score: Math.max(0, Math.min(1, score)),
    why: {
      genres: sharedGenres,
      mood,
      era: era === 1 ? "same era" : (era === 0.5 ? "nearby era" : null),
      plot: semantic != null && semantic >= 0.5 ? "similar plot" : null,
    },
  };
}

// --- semantic (plot/theme) similarity for live-TMDB neighbours ---
// Catalog-vs-catalog scores already bake in an embeddings term (see
// similarity/embed_catalog.py + compute_similarity.py). This covers a
// centered title that ISN'T in the catalog: TMDB's recommendations/similar
// candidates carry no mood tags and previously got no plot-aware signal at
// all, just a genre+era estimate.
const EMBED_BATCH_MAX = 20;

function cosineSim(a, b) {
  let dot = 0, na = 0, nb = 0;
  for (let i = 0; i < a.length; i++) {
    dot += a[i] * b[i];
    na += a[i] * a[i];
    nb += b[i] * b[i];
  }
  if (!na || !nb) return 0;
  return dot / (Math.sqrt(na) * Math.sqrt(nb));
}

// entries: [{key, text}] -> {key: vector|null}. Checks sessionStorage first
// (per-browser cache) before calling /api/embed (which has its own shared
// Vercel KV cache across all visitors) - see api/embed.js.
async function fetchEmbeddings(entries) {
  const vectors = {};
  const misses = [];
  for (const { key, text } of entries) {
    const cached = sessionStorage.getItem(`embed:${key}`);
    if (cached) vectors[key] = JSON.parse(cached);
    else misses.push({ key, text });
  }
  for (let i = 0; i < misses.length; i += EMBED_BATCH_MAX) {
    const batch = misses.slice(i, i + EMBED_BATCH_MAX);
    try {
      const r = await fetch("/api/embed", {
        method: "POST",
        headers: { "content-type": "application/json" },
        body: JSON.stringify({ items: batch }),
      });
      const data = await r.json();
      for (const { key } of batch) {
        const vec = data.vectors && data.vectors[key];
        vectors[key] = vec || null;
        if (vec) sessionStorage.setItem(`embed:${key}`, JSON.stringify(vec));
      }
    } catch (e) {
      for (const { key } of batch) vectors[key] = vectors[key] || null;
    }
  }
  return vectors;
}

// Embeds the center + each neighbour's overview and attaches `_semScore`
// (cosine similarity, 0-1) to each neighbour in place. Silently no-ops if
// the center has no overview text or the embed call fails - simBetween()
// falls back to its genre+era estimate either way.
async function attachSemanticScores(center, neighbors) {
  const centerText = (summaryOf(center, "en").text || "").trim();
  if (!centerText) return;
  const entries = [{ key: itemId(center), text: centerText }];
  for (const n of neighbors) {
    const text = (n.overview || "").trim();
    if (text) entries.push({ key: itemId(n), text });
  }
  if (entries.length < 2) return;
  const vectors = await fetchEmbeddings(entries);
  const centerVec = vectors[itemId(center)];
  if (!centerVec) return;
  for (const n of neighbors) {
    const vec = vectors[itemId(n)];
    if (vec) n._semScore = cosineSim(centerVec, vec);
  }
}

// Plot summary in the language the toggle is set to, with a fallback to
// whichever language actually has text. Catalog items carry both languages
// (synopsis_ar / tmdb_overview_en) on the raw record; pure-TMDB items only
// ever have an English overview (we never request TMDB in Arabic), so their
// "ar" request transparently falls back to English. Titles are never
// affected — only this summary follows summaryLang.
function summaryOf(x, lang) {
  const l = lang || summaryLang;
  const ar = (x._catalog && x._catalog.synopsis_ar) || "";
  const en = (x._catalog && x._catalog.tmdb_overview_en) || x.overview || "";
  const primary = l === "ar" ? ar : en;
  const fallback = l === "ar" ? en : ar;
  if (primary) return { text: primary, lang: l };
  if (fallback) return { text: fallback, lang: l === "ar" ? "en" : "ar" };
  return { text: "", lang: l };
}

// --- centered-title detail panel (persistent; a plain card on desktop, a
// bottom sheet on mobile) ---
// Shows the full details of the currently centered title, including its
// summary. It does NOT change on hover — hovering a neighbour shows a light
// tooltip instead (see showTooltip), so a summary stays readable.
// Split into .sheet-head (poster/title/meta/rating, always visible) and
// .sheet-body (summary/tags) — on mobile the body is collapsed by default
// (peek) until tapped open (see #info.expanded in the mobile media query
// and the click-delegation listener in the wiring section below); desktop
// shows both, unaffected by the "expanded" class.
function renderCenterInfo(x, keywords) {
  const genres = genreNames(x);
  const kw = keywords || [];
  const rating = x.vote_average;
  const poster = posterUrl(x, "w185");
  const summary = summaryOf(x);
  const info = document.getElementById("info");
  info.classList.remove("expanded");
  info.style.display = "block";
  info.innerHTML = `
    <div class="sheet-handle"></div>
    <div class="sheet-head">
      ${poster ? `<img class="poster" src="${esc(poster)}" alt="" />` : ""}
      <h2>${esc(nativeTitle(x))}</h2>
      <div class="meta">${esc(itemYear(x) || "?")} &middot; ${itemType(x) === "tv" ? "series" : "movie"} &middot; ${esc(genres.join(", ") || "no genre data")}</div>
      ${rating ? `<div class="rating">&#9733; ${(+rating).toFixed(1)}</div>` : ""}
    </div>
    <div class="sheet-body">
      ${summary.text
        ? `<div class="summary" dir="${summary.lang === "ar" ? "rtl" : "ltr"}">${esc(summary.text)}</div>`
        : `<div class="summary muted">${summaryLang === "ar" ? "لا يوجد ملخص متاح." : "No summary available."}</div>`}
      <div class="tags">${kw.slice(0, 6).map(t => `<span>${esc(t)}</span>`).join("")}</div>
    </div>
  `;
}

// --- hover tooltip (lightweight, follows the cursor) ---
function showTooltip(event, d) {
  const tip = document.getElementById("tooltip");
  const pct = d._sim != null ? Math.round(d._sim * 100) : null;
  const why = d._why || {};
  const chips = [
    ...(why.genres || []).slice(0, 3),
    ...(why.mood || []).slice(0, 3),
    ...(why.era ? [why.era] : []),
    ...(why.plot ? [why.plot] : []),
  ].map(tr);
  tip.innerHTML = `
    <div class="tt-title">${esc(nativeTitle(d))}</div>
    <div class="tt-sub">${esc(itemYear(d) || "")}${pct != null ? ` &middot; <span class="pct">${pct}% similar</span>` : ""}</div>
    ${chips.length ? `<div class="tags">${chips.map(c => `<span class="why">${esc(c)}</span>`).join("")}</div>` : ""}
  `;
  tip.style.display = "block";
  moveTooltip(event);
}
function moveTooltip(event) {
  const tip = document.getElementById("tooltip");
  const pad = 14, w = tip.offsetWidth, h = tip.offsetHeight;
  let x = event.clientX + pad, y = event.clientY + pad;
  if (x + w > window.innerWidth) x = event.clientX - w - pad;
  if (y + h > window.innerHeight) y = event.clientY - h - pad;
  tip.style.left = x + "px";
  tip.style.top = y + "px";
}
function hideTooltip() {
  document.getElementById("tooltip").style.display = "none";
}

// --- graph drawing (backend-agnostic) ---
function draw(nodes, links, centerId) {
  svg.selectAll("*").remove();
  const width = window.innerWidth, height = window.innerHeight;

  simulation = d3.forceSimulation(nodes)
    .force("link", d3.forceLink(links).id(d => d._id).distance(130).strength(0.5))
    .force("charge", d3.forceManyBody().strength(-400))
    .force("center", d3.forceCenter(width / 2, height / 2))
    .force("collide", d3.forceCollide(30));

  const link = svg.append("g").selectAll("line").data(links).join("line").attr("class", "link");

  const node = svg.append("g").selectAll("circle").data(nodes).join("circle")
    .attr("class", d => "node" + (d._id === centerId ? " center" : ""))
    .attr("r", d => d._id === centerId ? 20 : 12)
    .attr("fill", colorOf)
    .on("click", (event, d) => { if (d._id !== centerId) centerOn(d, true); })
    .on("mouseover", (event, d) => {
      if (d._id !== centerId) showTooltip(event, d);
      // Preview the hovered title's backdrop; fall back to the center's own
      // (rather than blanking out) if this node has none.
      updateBackdrop(d.backdrop_path || (currentCenter && currentCenter.backdrop_path) || null);
    })
    .on("mousemove", (event, d) => { if (d._id !== centerId) moveTooltip(event); })
    .on("mouseout", () => {
      hideTooltip();
      if (currentCenter) updateBackdrop(currentCenter.backdrop_path || null);
    })
    .call(drag());

  const label = svg.append("g").selectAll("text").data(nodes).join("text")
    .attr("class", "label")
    .attr("dy", d => d._id === centerId ? 32 : 22)
    .attr("text-anchor", "middle")
    .text(nativeTitle);

  simulation.on("tick", () => {
    link.attr("x1", d => d.source.x).attr("y1", d => d.source.y)
        .attr("x2", d => d.target.x).attr("y2", d => d.target.y);
    node.attr("cx", d => d.x).attr("cy", d => d.y);
    label.attr("x", d => d.x).attr("y", d => d.y);
  });
}

function drag() {
  return d3.drag()
    .on("start", (e, d) => { if (!e.active) simulation.alphaTarget(0.3).restart(); d.fx = d.x; d.fy = d.y; })
    .on("drag", (e, d) => { d.fx = e.x; d.fy = e.y; })
    .on("end", (e, d) => { if (!e.active) simulation.alphaTarget(0); d.fx = null; d.fy = null; });
}

// --- similarity-aware render (color scale, threshold filter, legend) ---
function simDomain(neighbors) {
  const vals = neighbors.map(n => n._sim).filter(v => v != null);
  if (!vals.length) return [0, 1];
  const min = Math.min(...vals), max = Math.max(...vals);
  return min === max ? [Math.max(0, min - 0.1), Math.min(1, max + 0.1)] : [min, max];
}

function updateLegend(shown) {
  const legend = document.getElementById("legend");
  if (colorMode !== "sim" || !shown.length) { legend.style.display = "none"; return; }
  legend.style.display = "block";
  const [min, max] = simDomain(shown);
  const stops = Array.from({ length: 8 }, (_, i) => simColor(min + (max - min) * i / 7));
  document.getElementById("legend-bar").style.background = `linear-gradient(to right, ${stops.join(",")})`;
  document.getElementById("legend-min").textContent = Math.round(min * 100) + "%";
  document.getElementById("legend-max").textContent = Math.round(max * 100) + "%";
}

function updateBackdrop(path) {
  const el = document.getElementById("backdrop");
  if (path) {
    el.style.backgroundImage = `url(https://image.tmdb.org/t/p/w1280${path})`;
    el.classList.add("show");
  } else {
    el.classList.remove("show");
  }
}

// --- genre / mood / decade filter chips ---
function neighborMoods(n) {
  return (n._catalog && n._catalog.mood_tags && n._catalog.mood_tags.ai_suggested) || [];
}
function decadeOf(year) {
  const y = +year;
  return y ? `${Math.floor(y / 10) * 10}s` : null;
}
function passesChipFilters(n) {
  if (selectedGenres.size && !genreNames(n).some(g => selectedGenres.has(g))) return false;
  if (selectedMoods.size && !neighborMoods(n).some(m => selectedMoods.has(m))) return false;
  if (selectedDecades.size && !selectedDecades.has(decadeOf(itemYear(n)))) return false;
  return true;
}
function renderChipGroup(containerId, options, selectedSet) {
  const el = document.getElementById(containerId);
  // data-v (and selectedSet) always hold the original English value, so
  // filtering logic is unaffected by the language toggle — only the label
  // shown to the user (tr(o)) changes.
  el.innerHTML = options.map(o =>
    `<button class="chip${selectedSet.has(o) ? " active" : ""}" data-v="${esc(o)}">${esc(tr(o))}</button>`
  ).join("");
  el.querySelectorAll(".chip").forEach(btn => {
    btn.addEventListener("click", () => {
      const v = btn.dataset.v;
      if (selectedSet.has(v)) selectedSet.delete(v); else selectedSet.add(v);
      btn.classList.toggle("active");
      if (currentCenter) renderGraph(currentCenter, currentNeighbors);
    });
  });
}
// Chip options come from the full neighbour set (not the filtered/shown one)
// so options stay stable as filters and the threshold slider are adjusted.
// The panel itself stays collapsed behind the "Filters" toggle button until
// the user opens it — it only takes up screen space on request.
function renderFilterChips(neighbors) {
  const genres = [...new Set(neighbors.flatMap(genreNames))].sort();
  const moods = [...new Set(neighbors.flatMap(neighborMoods))].sort();
  const decades = [...new Set(neighbors.map(n => decadeOf(itemYear(n))).filter(Boolean))].sort();
  renderChipGroup("genre-chips", genres, selectedGenres);
  renderChipGroup("mood-chips", moods, selectedMoods);
  renderChipGroup("decade-chips", decades, selectedDecades);
  document.getElementById("flabel-genre").textContent = catLabel("Genre");
  document.getElementById("flabel-mood").textContent = catLabel("Mood");
  document.getElementById("flabel-decade").textContent = catLabel("Decade");
  const hasOptions = genres.length || moods.length || decades.length;
  document.getElementById("filters-toggle").style.display = hasOptions ? "" : "none";
  document.getElementById("filters").style.display = (hasOptions && filtersOpen) ? "flex" : "none";
  const activeCount = selectedGenres.size + selectedMoods.size + selectedDecades.size;
  const badge = document.getElementById("filters-badge");
  badge.textContent = activeCount || "";
  badge.classList.toggle("show", activeCount > 0);
}

// Re-render the current center's graph — called after centering, and again
// (without refetching) when the color mode, threshold, or filter chips change.
function renderGraph(center, neighbors) {
  currentCenter = center;
  currentNeighbors = neighbors;
  const shown = neighbors.filter(n =>
    (n._sim == null || n._sim * 100 >= simThreshold) && passesChipFilters(n));
  simColor = d3.scaleSequential(d3.interpolateViridis).domain(simDomain(shown.length ? shown : neighbors));
  const centerId = itemId(center);
  const nodes = [{ ...center, _id: centerId }, ...shown.map(n => ({ ...n, _id: itemId(n) }))];
  const links = shown.map(n => ({ source: centerId, target: itemId(n) }));
  draw(nodes, links, centerId);
  updateLegend(shown);
  renderFilterChips(neighbors);
}

// --- curated catalog (searched first; TMDB is the fallback) ---
const CATALOG_IMG = "https://image.tmdb.org/t/p/w500";
// Adapt a docs/data.json record into the same "item" shape the graph uses,
// keeping the raw record on _catalog so neighbours/tags come from our data.
function catalogToItem(rec) {
  return {
    id: rec.tmdb_id,
    media_type: "movie",
    title: rec.title_en || "",
    original_title: rec.title_ar || "",
    original_language: rec.tmdb_original_language || "ar",
    _genres: rec.genres || [],
    poster_path: rec.poster_url ? rec.poster_url.replace(CATALOG_IMG, "") : null,
    backdrop_path: rec.backdrop_path || null,
    vote_average: rec.vote_average || null,
    release_date: rec.year ? `${rec.year}-01-01` : "",
    _catalog: rec,
  };
}
function searchCatalog(q) {
  if (!catalogReady) return [];
  const ql = q.toLowerCase();
  const pool = catalog.filter(x => originFilter === "en" ? isForeign(x) : !isForeign(x));
  return pool.filter(x =>
    (x.title || "").toLowerCase().includes(ql) ||
    (x.original_title || "").includes(q)
  ).slice(0, 10);
}
// The precomputed top-8 (similarity/compute_similarity.py) is language-
// agnostic, and ~96% of the catalog is Arabic-original, so a non-Arabic
// title's precomputed neighbours are often entirely Arabic — e.g. one
// EL-language film's real top-8 were 8/8 Arabic. To keep "similar movies"
// meaningfully in the same language group as the center, prefer same-group
// (foreign vs. Arabic-origin) neighbours: if the precomputed list doesn't
// have enough, extend from the full catalog using the same weighted formula
// the offline engine uses (genre/mood/era). Falls back to cross-group
// neighbours only if the same-group pool still can't fill the slots.
const NEIGHBOR_TARGET = 8, NEIGHBOR_CAP = 12;
function catalogNeighbors(rec) {
  const centerItem = catalogToItem(rec);
  const centerForeign = isForeign(centerItem);

  const precomputed = (rec.neighbors || [])
    .map(n => {
      const nrec = catalogById[n.id];
      if (!nrec) return null;
      const item = catalogToItem(nrec);
      item._score = n.score;   // precomputed similarity (0-1) from compute_similarity.py
      return item;
    })
    .filter(Boolean);

  const sameGroup = precomputed.filter(n => isForeign(n) === centerForeign);
  const crossGroup = precomputed.filter(n => isForeign(n) !== centerForeign);

  let result = sameGroup.slice(0, NEIGHBOR_TARGET);
  if (result.length < NEIGHBOR_TARGET) {
    const haveIds = new Set(result.map(n => n.id));
    const extra = catalog
      .filter(x => x.id !== centerItem.id && isForeign(x) === centerForeign && !haveIds.has(x.id))
      .map(x => ({ item: x, score: catalogFullScore(centerItem, x) }))
      .sort((a, b) => b.score - a.score)
      .slice(0, NEIGHBOR_TARGET - result.length)
      .map(({ item, score }) => Object.assign({}, item, { _score: score }));
    result = result.concat(extra);
  }
  if (result.length < NEIGHBOR_CAP) {
    result = result.concat(crossGroup.slice(0, NEIGHBOR_CAP - result.length));
  }
  return result.slice(0, NEIGHBOR_CAP);
}

// --- data fetching ---
async function fetchNeighbors(item) {
  // Curated title -> curated neighbours (also catch a TMDB search hit that
  // happens to be in our catalog, so it gets the mood-tag graph too).
  const rec = item._catalog || (itemType(item) === "movie" && catalogById[String(item.id)]);
  if (rec) return catalogNeighbors(rec);
  const key = itemId(item);
  if (neighborCache[key]) return neighborCache[key];
  const type = itemType(item);
  let results = [];
  try {
    const rec = await api(`${type}/${item.id}/recommendations`);
    results = rec.results || [];
    if (results.length < 6) {
      const sim = await api(`${type}/${item.id}/similar`);
      results = results.concat(sim.results || []);
    }
  } catch (e) { results = []; }
  // Dedupe by id, drop the center itself, cap at 12, tag media_type.
  const seen = new Set([item.id]);
  const neighbors = [];
  for (const r of results) {
    if (seen.has(r.id)) continue;
    seen.add(r.id);
    r.media_type = r.media_type || type;
    neighbors.push(r);
    if (neighbors.length >= 12) break;
  }
  neighborCache[key] = neighbors;
  return neighbors;
}

// TMDB details for a non-catalog centered title, cached by id. Only its
// `keywords` are actually used (centerOn already has backdrop/rating from the
// item itself); backdrop_path/vote_average are returned too as a defensive
// fallback in case a caller's item is missing them.
async function fetchDetails(item) {
  const key = itemId(item);
  if (detailsCache[key]) return detailsCache[key];
  const type = itemType(item);
  try {
    const d = await api(`${type}/${item.id}`, { append_to_response: "keywords" });
    const kw = (d.keywords && (d.keywords.keywords || d.keywords.results)) || [];
    const details = {
      backdrop_path: d.backdrop_path || null,
      vote_average: d.vote_average || null,
      keywords: kw.map(k => k.name),
    };
    detailsCache[key] = details;
    return details;
  } catch (e) {
    return { backdrop_path: null, vote_average: null, keywords: [] };
  }
}

async function centerOn(item, pushHistory) {
  document.getElementById("loading").style.display = "block";
  if (pushHistory) history.push(item);
  const rec = item._catalog || (itemType(item) === "movie" && catalogById[String(item.id)]);
  selectedGenres.clear();
  selectedMoods.clear();
  selectedDecades.clear();
  filtersOpen = false;
  document.getElementById("filters-toggle").classList.remove("active");
  // Catalog titles carry backdrop_path/vote_average/mood tags already (from
  // the enriched docs/data.json), so centering on one needs no network call
  // at all beyond fetching its neighbours. Only a pure-TMDB title needs a
  // details fetch, and only for its `keywords` (the rest — backdrop, rating —
  // are already present on the raw TMDB item from search/recommendations).
  const [neighborsRaw, keywords] = await Promise.all([
    fetchNeighbors(item),
    rec ? Promise.resolve((rec.mood_tags && rec.mood_tags.ai_suggested) || [])
        : fetchDetails(item).then(d => d.keywords),
  ]);
  if (!rec) await attachSemanticScores(item, neighborsRaw);
  const neighbors = neighborsRaw.map(n => {
    const { score, why } = simBetween(item, n);
    return { ...n, _sim: score, _why: why };
  });
  currentKeywords = keywords;
  renderGraph(item, neighbors);
  renderCenterInfo(item, keywords);
  hideTooltip();
  updateBackdrop(item.backdrop_path || null);
  window.history.replaceState(null, "", "?movie=" + encodeURIComponent(itemId(item)));
  document.getElementById("loading").style.display = "none";
  document.getElementById("back").disabled = history.length <= 1;
}

// --- landing / search ---
function showMap(item) {
  document.getElementById("landing").style.display = "none";
  document.getElementById("toolbar").style.display = "flex";
  document.body.classList.add("map-open");
  history = [];
  centerOn(item, true);
}

function renderResults(items) {
  const box = document.getElementById("search-results");
  if (!items) { box.classList.remove("show"); box.innerHTML = ""; return; }
  box.classList.add("show");
  if (items.length === 0) { box.innerHTML = `<div class="msg">No matches.</div>`; return; }
  box.innerHTML = items.map((x, i) => `
    <div class="item" data-i="${i}">
      ${posterUrl(x) ? `<img src="${esc(posterUrl(x))}" alt="" />` : `<img alt="" />`}
      <div class="t">
        <div class="name">${esc(nativeTitle(x))}</div>
        <div class="sub">${esc(itemYear(x) || "")}</div>
      </div>
      ${x._catalog ? `<div class="badge" style="border-color:#4a7ac0;color:#8fb4e8">catalog</div>` : ``}
      <div class="badge">${itemType(x) === "tv" ? "series" : "movie"}</div>
    </div>`).join("");
  box.querySelectorAll(".item").forEach(el => {
    el.addEventListener("click", () => showMap(items[+el.dataset.i]));
  });
}

let searchSeq = 0;
async function runSearch(query) {
  const q = query.trim();
  if (q.length < 2) { renderResults(null); return; }
  const seq = ++searchSeq;
  const local = searchCatalog(q);           // instant, from our curated data
  let tmdb = [];
  try {
    const data = await api("search/multi", { query: q });
    if (seq !== searchSeq) return;           // a newer keystroke superseded this one
    tmdb = (data.results || [])
      .filter(x => (x.media_type === "movie" || x.media_type === "tv"))
      .filter(x => originFilter === "en" ? isForeign(x) : !isForeign(x));
  } catch (e) {
    if (seq !== searchSeq) return;
  }
  // Catalog matches first; then TMDB titles not already covered by the catalog.
  const seen = new Set(local.map(x => x.id));
  const merged = [...local, ...tmdb.filter(x => !seen.has(x.id))].slice(0, 20);
  renderResults(merged);
}

function debounce(fn, ms) {
  let t; return (...a) => { clearTimeout(t); t = setTimeout(() => fn(...a), ms); };
}

// --- wiring ---
document.getElementById("new-search").addEventListener("click", () => {
  document.getElementById("toolbar").style.display = "none";
  document.getElementById("info").style.display = "none";
  document.getElementById("legend").style.display = "none";
  document.getElementById("filters").style.display = "none";
  document.getElementById("landing").style.display = "flex";
  document.getElementById("backdrop").classList.remove("show");
  document.body.classList.remove("map-open");
  window.scrollTo(0, 0);
  svg.selectAll("*").remove();
  currentCenter = null;
  currentNeighbors = [];
  selectedGenres.clear();
  selectedMoods.clear();
  selectedDecades.clear();
  filtersOpen = false;
  document.getElementById("filters-toggle").classList.remove("active");
  window.history.replaceState(null, "", window.location.pathname);
  const box = document.getElementById("search-box");
  box.value = ""; renderResults(null); box.focus();
});

document.getElementById("surprise").addEventListener("click", () => {
  const pool = catalog.filter(x => originFilter === "en" ? isForeign(x) : !isForeign(x));
  if (!pool.length) return;
  showMap(pool[Math.floor(Math.random() * pool.length)]);
});

document.getElementById("back").addEventListener("click", () => {
  if (history.length <= 1) return;
  history.pop();
  centerOn(history[history.length - 1], false);
});

document.getElementById("color-toggle").addEventListener("click", () => {
  colorMode = colorMode === "sim" ? "genre" : "sim";
  const btn = document.getElementById("color-toggle");
  btn.textContent = "Color: " + (colorMode === "sim" ? "similarity" : "genre");
  btn.classList.toggle("active", colorMode === "sim");
  if (currentCenter) renderGraph(currentCenter, currentNeighbors);
});

document.getElementById("threshold").addEventListener("input", (e) => {
  simThreshold = +e.target.value;
  document.getElementById("threshold-val").textContent = simThreshold + "%";
  if (currentCenter) renderGraph(currentCenter, currentNeighbors);
});

document.getElementById("filters-toggle").addEventListener("click", () => {
  filtersOpen = !filtersOpen;
  document.getElementById("filters-toggle").classList.toggle("active", filtersOpen);
  if (currentCenter) renderGraph(currentCenter, currentNeighbors);
});

document.querySelectorAll("#origin-filter button").forEach(btn => {
  btn.addEventListener("click", () => {
    document.querySelectorAll("#origin-filter button").forEach(b => b.classList.remove("active"));
    btn.classList.add("active");
    originFilter = btn.dataset.origin;
    runSearch(document.getElementById("search-box").value);
  });
});

// Site-wide summary/Vibes language toggle — separate from #origin-filter
// above, which only controls which movies search returns. Titles never
// change; only the summary text and Vibes chip/tooltip labels do.
function setSummaryLang(lang) {
  summaryLang = lang;
  localStorage.setItem("summaryLang", lang);
  document.querySelectorAll("#lang-toggle button").forEach(b => b.classList.toggle("active", b.dataset.lang === lang));
  if (currentCenter) {
    renderCenterInfo(currentCenter, currentKeywords);
    renderFilterChips(currentNeighbors);
  }
}
document.querySelectorAll("#lang-toggle button").forEach(btn => {
  btn.classList.toggle("active", btn.dataset.lang === summaryLang);
  btn.addEventListener("click", () => setSummaryLang(btn.dataset.lang));
});

// Mobile bottom sheet: tap the handle or the head to expand/collapse the
// summary. Delegated (rather than bound per render) since #info's content
// is replaced wholesale on every renderCenterInfo call.
document.getElementById("info").addEventListener("click", (e) => {
  if (e.target.closest(".sheet-handle") || e.target.closest(".sheet-head")) {
    document.getElementById("info").classList.toggle("expanded");
  }
});

// Mobile "Controls" menu: below 640px, reparent the scattered corner panels
// (color/threshold/vibes/language/legend) into one #controls-menu so they
// stop colliding; above 640px, restore each to its original spot so desktop
// is unaffected. IDs, listeners and existing show/hide logic on these
// elements are untouched by moving them — only their position in the DOM
// (and thus in the mobile layout) changes.
const CONTROLS_MENU_IDS = ["color-toggle", "threshold-wrap", "filters-toggle", "filters", "lang-toggle", "legend"];
const controlsHome = new Map(); // id -> { parent, next } — original desktop location
function applyControlsLayout(isMobile) {
  const menu = document.getElementById("controls-menu");
  CONTROLS_MENU_IDS.forEach(id => {
    const el = document.getElementById(id);
    if (!controlsHome.has(id)) controlsHome.set(id, { parent: el.parentNode, next: el.nextSibling });
    if (isMobile) {
      if (el.parentNode !== menu) menu.appendChild(el);
    } else {
      const home = controlsHome.get(id);
      if (el.parentNode !== home.parent) home.parent.insertBefore(el, home.next);
    }
  });
}
const mobileMQ = window.matchMedia("(max-width: 640px)");
applyControlsLayout(mobileMQ.matches);
mobileMQ.addEventListener("change", (e) => applyControlsLayout(e.matches));

document.getElementById("controls-toggle").addEventListener("click", () => {
  document.getElementById("controls-menu").classList.toggle("open");
});

document.getElementById("search-box").addEventListener("input", debounce(e => runSearch(e.target.value), 300));

svg = d3.select("svg");
// Load the genre id->name maps once so nodes can show/colour by genre.
Promise.all([api("genre/movie/list"), api("genre/tv/list")]).then(([m, t]) => {
  [...(m.genres || []), ...(t.genres || [])].forEach(g => { genreMap[g.id] = g.name; });
});
// Load the curated catalog in the background so search can query it first.
// Failure is non-fatal — the app falls back to live TMDB search alone.
const catalogLoadPromise = fetch("./docs/data.json")
  .then(r => r.json())
  .then(data => {
    catalog = data.map(catalogToItem);
    catalogById = Object.fromEntries(data.map(d => [d.id, d]));
    catalogReady = true;
    document.getElementById("surprise").disabled = false;
  })
  .catch(() => {});

// Shareable deep link: ?movie=<type>:<id> opens the map centered on that
// title directly, skipping the landing page. centerOn() writes this param
// via history.replaceState whenever a new title is centered.
async function initFromUrl() {
  const movie = new URLSearchParams(window.location.search).get("movie");
  if (!movie) return;
  const sep = movie.indexOf(":");
  if (sep < 0) return;
  const type = movie.slice(0, sep), idStr = movie.slice(sep + 1);
  await catalogLoadPromise;
  let item = (type === "movie" && catalogById[idStr]) ? catalogToItem(catalogById[idStr]) : null;
  if (!item) {
    try {
      const d = await api(`${type}/${idStr}`);
      if (!d || d.success === false) return;
      item = { ...d, media_type: type };
    } catch (e) { return; }
  }
  showMap(item);
}
initFromUrl();
</script>
